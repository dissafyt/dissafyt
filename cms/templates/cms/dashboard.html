<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Dashboard - {{ client.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">CMS - {{ client.name }}</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'home' %}">View Site</a>
                <a class="nav-link" href="#">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Dashboard</h1>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Business Info</div>
                    <div class="card-body">
                        <p><strong>Name:</strong> {{ client.name }}</p>
                        <p><strong>Domain:</strong> {{ client.domain }}</p>
                        <p><strong>Owner:</strong> {{ client.owner.username }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Quick Actions</div>
                    <div class="card-body">
                        <a href="#" class="btn btn-primary">Edit Content</a>
                        <a href="#" class="btn btn-secondary">Manage Media</a>
                        <a href="#" class="btn btn-success">Deploy Changes</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
